spring:
  application:
    name: order-api

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/restaurant}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:root}

  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false

  servlet:
    multipart:
      max-file-size: 5MB       # max single file
      max-request-size: 10MB   # max total request

# Storage config — swap values when moving to GCP
storage:
  local:
    base-path: uploads
    base-url: http://localhost:8080/images
  gcs:
    bucket-name: ${GCS_BUCKET_NAME:your-bucket-name}